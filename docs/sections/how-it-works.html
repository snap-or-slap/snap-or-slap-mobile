<section id="how-it-works" class="section">
  <div class="container split">

    <!-- Steps column -->
    <div class="how-it-works__steps reveal">
      <div class="section-header" style="text-align:left;margin-bottom:var(--space-8);">
        <span class="badge section-header__badge">How It Works</span>
        <h2 class="section-header__title">Three taps, one review</h2>
      </div>

      <div class="step">
        <div class="step__number">1</div>
        <div class="step__content">
          <h4>Open &amp; scan</h4>
          <p>Launch the app and scan a product barcode — or search by name.</p>
        </div>
      </div>

      <div class="step">
        <div class="step__number">2</div>
        <div class="step__content">
          <h4>Snap or Slap</h4>
          <p>Swipe right to Snap (recommend) or left to Slap (pass). Done!</p>
        </div>
      </div>

      <div class="step">
        <div class="step__number">3</div>
        <div class="step__content">
          <h4>Share &amp; explore</h4>
          <p>See the live community ratio and share a visual card on social media.</p>
        </div>
      </div>
    </div>

    <!-- Visual column -->
    <div class="reveal" style="display:flex;justify-content:center;">
      <!-- FUTURE: Replace this placeholder with a real screenshot or animation.
           Place the image in assets/mockups/ and update the src. -->
      <div class="phone-frame" aria-label="How-it-works screenshot placeholder">
        <div style="width:244px;height:488px;
                    background:linear-gradient(160deg,var(--color-support-100),var(--color-support-300));
                    display:flex;align-items:center;justify-content:center;
                    font-size:var(--text-3xl);color:var(--color-support-600);">
          🔄
        </div>
      </div>
    </div>

  </div>
</section>
